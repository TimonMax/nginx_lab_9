name: PHP docker CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Start docker
        run: docker compose up -d --build

      - name: Prepare test env
        run: |
          cat > .env.test <<'EOF'
          APP_URL=http://nginx
          DB_HOST=db
          DB_NAME=test_db
          DB_USER=test_user
          DB_PASSWORD=test_pass
          EOF

      - name: Install dependencies
        run: docker compose exec -T php composer install --no-interaction --prefer-dist

      - name: Run tests
        run: docker compose exec -T php php vendor/bin/phpunit --bootstrap tests/bootstrap.php tests

      - name: Stop containers
        if: always()
        run: docker compose down -v